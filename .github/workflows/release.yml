name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x bin/build.sh

      - name: Build plugin zips
        run: bin/build.sh

      - name: Determine release version
        id: version
        run: |
          version="$(grep -iE '^\s*\*?\s*Version:' tutorlms-analytics.php \
            | head -n1 \
            | sed -E 's/.*[Vv]ersion:[[:space:]]*([0-9A-Za-z._-]+).*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: v${version}"

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — refreshing assets."
            gh release upload "$TAG" dist/*.zip --clobber
          else
            echo "Creating release $TAG at ${GITHUB_SHA}."
            gh release create "$TAG" dist/*.zip \
              --target "${GITHUB_SHA}" \
              --title "$TAG" \
              --generate-notes
          fi
